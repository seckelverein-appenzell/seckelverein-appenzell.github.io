<!doctype html>
<html lang="de" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.1/daisyui.css" rel="stylesheet" type="text/css" />
    <link rel="icon" type="image/jpeg" href="/static/img/logo.jpg">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="b8935c88-3181-4648-96c9-11e74d6d0557"></script>
    <script src="/components/site-navbar.js"></script>
    <script src="/components/site-footer.js"></script>
    <title>Seckelverein Appenzell – Würfel</title>

    <style>
        .scene {
            width: 100px;
            height: 100px;
            perspective: 600px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            transform: rotateX(-30deg) rotateY(45deg);
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 900;
            color: #111;
            border-radius: 14px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.07);
            user-select: none;
        }

        .face-1 { transform: rotateY(0deg)   translateZ(50px); }
        .face-2 { transform: rotateY(90deg)  translateZ(50px); }
        .face-3 { transform: rotateY(180deg) translateZ(50px); }
        .face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 { transform: rotateX(90deg)  translateZ(50px); }
        .face-6 { transform: rotateX(-90deg) translateZ(50px); }

        .scene:active .cube {
            transition: transform 0.1s;
            transform: scale(0.88) rotateX(-30deg) rotateY(45deg);
        }

        .dice-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        @keyframes dice-in {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dice-wrapper {
            animation: dice-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col bg-base-100">

<site-navbar></site-navbar>

<main class="pt-16 flex-1 flex flex-col items-center justify-center gap-12 px-6">

    <!-- Dice row -->
    <div id="dice-row" class="flex flex-wrap items-end justify-center gap-8"></div>

    <!-- Buttons -->
    <div class="flex items-center gap-4">
        <button
                onclick="addDice()"
                class="btn rounded-full bg-orange-600 text-white border-none shadow-lg hover:bg-orange-700 font-black italic uppercase tracking-wider px-8"
                title="Würfel hinzufügen"
        >+</button>
    </div>

</main>

<site-footer></site-footer>

<script>
    const rotations = {
        1: { x: 0,   y: 0    },
        2: { x: 0,   y: -90  },
        3: { x: 0,   y: -180 },
        4: { x: 0,   y: 90   },
        5: { x: -90, y: 0    },
        6: { x: 90,  y: 0    }
    };

    let dice = [];
    let nextId = 0;
    let isRolling = false;

    function addDice() {
        const id = nextId++;
        dice.push({ id, value: null });
        renderAll();
    }

    function removeDice(id) {
        dice = dice.filter(d => d.id !== id);
        renderAll();
    }

    function rollAll() {
        if (isRolling || dice.length === 0) return;
        isRolling = true;

        // Assign results to all dice
        dice.forEach(d => {
            d.value = Math.floor(Math.random() * 6) + 1;
        });

        // Animate all cubes simultaneously
        dice.forEach(d => {
            const cubeEl = document.getElementById(`cube-${d.id}`);
            if (!cubeEl) return;
            const extraSpinsX = (Math.floor(Math.random() * 3) + 3) * 360;
            const extraSpinsY = (Math.floor(Math.random() * 3) + 3) * 360;
            const target = rotations[d.value];
            cubeEl.style.transform = `rotateX(${extraSpinsX + target.x}deg) rotateY(${extraSpinsY + target.y}deg)`;
        });

        // After animation: sort and re-render
        setTimeout(() => {
            dice.sort((a, b) => b.value - a.value);
            renderAllKeepTransforms();
            isRolling = false;
        }, 1200);
    }

    function renderAll() {
        const row = document.getElementById('dice-row');
        row.innerHTML = dice.map(d => diceHTML(d)).join('');
    }

    function renderAllKeepTransforms() {
        // Save current transforms before re-render
        const transforms = {};
        dice.forEach(d => {
            const el = document.getElementById(`cube-${d.id}`);
            if (el) transforms[d.id] = el.style.transform;
        });

        renderAll();

        // Restore transforms without re-triggering animation
        dice.forEach(d => {
            const el = document.getElementById(`cube-${d.id}`);
            if (el && transforms[d.id]) {
                el.style.transition = 'none';
                el.style.transform = transforms[d.id];
                requestAnimationFrame(() => { el.style.transition = ''; });
            }
        });
    }

    function diceHTML(d) {
        return `
        <div class="dice-wrapper" id="wrapper-${d.id}">
          <div class="scene" onclick="rollAll()">
            <div class="cube" id="cube-${d.id}">
              <div class="cube-face face-1">1</div>
              <div class="cube-face face-2">2</div>
              <div class="cube-face face-3">3</div>
              <div class="cube-face face-4">4</div>
              <div class="cube-face face-5">5</div>
              <div class="cube-face face-6">6</div>
            </div>
          </div>
          <button
            onclick="event.stopPropagation(); removeDice(${d.id})"
            class="btn btn-xs btn-ghost text-zinc-300 hover:text-red-500 hover:bg-transparent font-black uppercase tracking-widest"
          >✕</button>
        </div>
      `;
    }

    // Start with one dice
    addDice();
</script>

</body>
</html>

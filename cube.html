<!doctype html>
<html lang="de" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.1/daisyui.css" rel="stylesheet" type="text/css"/>
    <link rel="icon" type="image/jpeg" href="/static/img/logo.jpg">
    <script defer src="https://cloud.umami.is/script.js"
            data-website-id="b8935c88-3181-4648-96c9-11e74d6d0557"></script>
    <script src="/components/site-navbar.js"></script>
    <script src="/components/site-footer.js"></script>
    <title>Seckelverein Appenzell – Würfel</title>

    <style>
        .scene {
            width: 120px;
            height: 120px;
            perspective: 700px;
            cursor: pointer;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            transform: rotateX(-30deg) rotateY(45deg);
        }

        .cube-face {
            position: absolute;
            width: 120px;
            height: 120px;
            background: white;
            border: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: 900;
            color: #111;
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.07);
            user-select: none;
        }

        .face-1 {
            transform: rotateY(0deg) translateZ(60px);
        }

        .face-2 {
            transform: rotateY(90deg) translateZ(60px);
        }

        .face-3 {
            transform: rotateY(180deg) translateZ(60px);
        }

        .face-4 {
            transform: rotateY(-90deg) translateZ(60px);
        }

        .face-5 {
            transform: rotateX(90deg) translateZ(60px);
        }

        .face-6 {
            transform: rotateX(-90deg) translateZ(60px);
        }

        .scene:active .cube {
            transition: transform 0.1s;
            transform: scale(0.88) rotateX(-30deg) rotateY(45deg);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col bg-base-100">

<site-navbar></site-navbar>

<main class="pt-16 flex-1 flex items-center justify-center">
    <div class="scene" onclick="rollDice()">
        <div class="cube" id="cube">
            <div class="cube-face face-1">1</div>
            <div class="cube-face face-2">2</div>
            <div class="cube-face face-3">3</div>
            <div class="cube-face face-4">4</div>
            <div class="cube-face face-5">5</div>
            <div class="cube-face face-6">6</div>
        </div>
    </div>
</main>

<site-footer></site-footer>

<script>
    let isRolling = false;

    function rollDice() {
        if (isRolling) return;
        isRolling = true;

        const cube = document.getElementById('cube');
        const result = Math.floor(Math.random() * 6) + 1;

        const extraSpinsX = (Math.floor(Math.random() * 3) + 3) * 360;
        const extraSpinsY = (Math.floor(Math.random() * 3) + 3) * 360;

        const rotations = {
            1: {x: 0, y: 0},
            2: {x: 0, y: -90},
            3: {x: 0, y: -180},
            4: {x: 0, y: 90},
            5: {x: -90, y: 0},
            6: {x: 90, y: 0}
        };

        const target = rotations[result];
        cube.style.transform = `rotateX(${extraSpinsX + target.x}deg) rotateY(${extraSpinsY + target.y}deg)`;

        setTimeout(() => {
            isRolling = false;
        }, 1200);
    }
</script>

</body>
</html>
